<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello, World!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      font-family: 'Georgia', serif;
      overflow: hidden;
      user-select: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .stage {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    h1 {
      font-size: clamp(2.8rem, 10vw, 7rem);
      font-weight: normal;
      letter-spacing: -0.02em;
      color: #f5f0e8;
      line-height: 1.1;
      transition: transform 0.1s ease;
    }

    h1 span {
      display: inline-block;
      transition: color 0.4s ease;
    }

    h1:hover span {
      animation: jiggle 0.5s ease forwards;
    }

    .subtitle {
      margin-top: 1rem;
      font-size: clamp(0.8rem, 2.5vw, 1.1rem);
      color: #888;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: 'Courier New', monospace;
    }

    .btn {
      margin-top: 2.5rem;
      padding: 0.65rem 1.8rem;
      background: transparent;
      border: 1px solid #444;
      border-radius: 2px;
      color: #888;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.25s, color 0.25s;
    }

    .btn:hover {
      border-color: #f5f0e8;
      color: #f5f0e8;
    }

    .disclaimer {
      position: fixed;
      bottom: 1.2rem;
      font-size: 0.68rem;
      color: #3a3a3a;
      font-family: 'Courier New', monospace;
      letter-spacing: 0.08em;
    }

    @keyframes jiggle {
      0%   { transform: rotate(0deg); }
      20%  { transform: rotate(-4deg) scale(1.08); }
      40%  { transform: rotate(4deg) scale(1.1); }
      60%  { transform: rotate(-2deg); }
      80%  { transform: rotate(2deg); }
      100% { transform: rotate(0deg) scale(1); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .stage > * {
      animation: fadeIn 0.8s ease backwards;
    }
    .stage h1       { animation-delay: 0.1s; }
    .stage .subtitle { animation-delay: 0.35s; }
    .stage .btn     { animation-delay: 0.55s; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="stage">
    <h1><span>Hello, Alastair!</span></h1>
    <p class="subtitle">Established&nbsp; circa&nbsp; the&nbsp; beginning&nbsp; of&nbsp; everything</p>
    <button class="btn" id="moreBtn">more confetti, apparently</button>
  </div>

  <p class="disclaimer">* confetti included under protest, per project requirements</p>

  <script>
    // ── confetti engine ──────────────────────────────────────────────────────
    const canvas = document.getElementById('c');
    const ctx    = canvas.getContext('2d');

    const COLORS = ['#e8d5b7','#c9b99a','#a08060','#6b8f71','#4a7c8e','#7b6d8d','#c97c5d'];
    const pieces = [];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    class Piece {
      constructor(x, burst) {
        this.x    = x ?? Math.random() * canvas.width;
        this.y    = burst ? canvas.height * 0.45 : -12;
        this.vx   = (Math.random() - 0.5) * (burst ? 9 : 2.5);
        this.vy   = burst ? -(Math.random() * 12 + 6) : (Math.random() * 2 + 1.5);
        this.size = Math.random() * 7 + 4;
        this.rot  = Math.random() * Math.PI * 2;
        this.drot = (Math.random() - 0.5) * 0.18;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.shape = Math.random() < 0.5 ? 'rect' : 'circle';
        this.gravity = burst ? 0.35 : 0.04;
        this.alpha = 1;
        this.fade  = Math.random() * 0.004 + 0.002;
      }
      update() {
        this.x   += this.vx;
        this.vy  += this.gravity;
        this.y   += this.vy;
        this.rot += this.drot;
        this.alpha -= this.fade;
      }
      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        ctx.fillStyle = this.color;
        if (this.shape === 'rect') {
          ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
      dead() { return this.alpha <= 0 || this.y > canvas.height + 20; }
    }

    // gentle ambient rain
    function spawnAmbient() {
      if (pieces.length < 60) pieces.push(new Piece());
    }
    setInterval(spawnAmbient, 350);

    // burst on demand
    function burst() {
      const cx = canvas.width / 2;
      for (let i = 0; i < 90; i++) pieces.push(new Piece(cx + (Math.random()-0.5)*60, true));
    }

    // initial polite burst on load
    setTimeout(burst, 700);

    document.getElementById('moreBtn').addEventListener('click', burst);

    // click anywhere on h1 for a mini burst
    document.querySelector('h1').addEventListener('click', burst);

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = pieces.length - 1; i >= 0; i--) {
        pieces[i].update();
        pieces[i].draw();
        if (pieces[i].dead()) pieces.splice(i, 1);
      }
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
