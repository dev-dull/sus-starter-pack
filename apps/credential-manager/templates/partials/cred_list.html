{% if creds %}
  {% for cred in creds %}
  <div class="cred-row">
    <div class="cred-info">
      <div class="cred-name">{{ cred.display_name }}</div>
      {% if cred.description %}
      <div class="cred-desc">{{ cred.description }}</div>
      {% else %}
      <div class="cred-desc" style="font-family:monospace;">{{ cred.name }}</div>
      {% endif %}
    </div>
    <div class="cred-keys">
      {% for key in cred['keys'] %}
      <span class="key-chip">{{ key }}</span>
      {% endfor %}
    </div>
    <div class="cred-actions">
      <button
        class="btn btn-secondary btn-sm"
        onclick="openEditDrawer({{ cred.name | tojson | forceescape }}, {{ cred.display_name | tojson | forceescape }}, {{ cred.description | tojson | forceescape }}, {{ cred['keys'] | tojson | forceescape }})"
      >Edit</button>
      <button
        class="btn btn-danger btn-sm"
        onclick="deleteCred('{{ cred.name }}', {{ cred.display_name | tojson | forceescape }})"
      >Delete</button>
    </div>
  </div>
  {% endfor %}
{% else %}
  <div class="empty-state">No credentials yet. Click <strong>+ New credential</strong> to add one.</div>
{% endif %}
