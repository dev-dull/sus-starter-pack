{% if creds %}
  {% for cred in creds %}
  <div class="cred-row">
    <div class="cred-info">
      <div class="cred-name">{{ cred.display_name }}</div>
      {% if cred.description %}
      <div class="cred-desc">{{ cred.description }}</div>
      {% else %}
      <div class="cred-desc" style="font-family:monospace;">{{ cred.name }}</div>
      {% endif %}
    </div>
    <div class="cred-keys">
      {% for key in cred['keys'] %}
      <span class="key-chip">{{ key }}</span>
      {% endfor %}
    </div>
    <div class="cred-actions">
      <button
        class="btn btn-secondary btn-sm"
        onclick="openEditDrawer({{ cred.name | tojson }}, {{ cred.display_name | tojson }}, {{ cred.description | tojson }}, {{ cred.keys | tojson }})"
      >Edit</button>
      <form method="post" action="." style="display:inline;"
        onsubmit="return confirm('Delete \u201c{{ cred.display_name }}\u201d? This cannot be undone.')">
        <input type="hidden" name="_action" value="delete">
        <input type="hidden" name="_name" value="{{ cred.name }}">
        <button type="submit" class="btn btn-danger btn-sm">Delete</button>
      </form>
    </div>
  </div>
  {% endfor %}
{% else %}
  <div class="empty-state">No credentials yet. Click <strong>+ New credential</strong> to add one.</div>
{% endif %}
