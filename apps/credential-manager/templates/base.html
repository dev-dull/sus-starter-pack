<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Credential Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #d2d2d7;
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header .namespace-badge {
      font-size: 0.75rem;
      background: #e8f0fe;
      color: #1a56db;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-family: monospace;
    }

    main { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }

    .card {
      background: #fff;
      border: 1px solid #d2d2d7;
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #f0f0f5;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-header h2 { font-size: 0.95rem; font-weight: 600; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn-primary   { background: #1a56db; color: #fff; }
    .btn-primary:hover   { background: #1648c0; }
    .btn-secondary { background: #f0f0f5; color: #1d1d1f; }
    .btn-secondary:hover { background: #e0e0ea; }
    .btn-danger    { background: #fff; color: #c0392b; border: 1px solid #e0c0be; }
    .btn-danger:hover    { background: #fdf3f2; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }

    .error-banner {
      background: #fdf3f2;
      border: 1px solid #f0b8b4;
      color: #c0392b;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.25rem;
      font-size: 0.875rem;
    }

    /* Cred list */
    #cred-list { min-height: 60px; }

    .cred-row {
      display: flex;
      align-items: center;
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid #f0f0f5;
      gap: 1rem;
    }
    .cred-row:last-child { border-bottom: none; }

    .cred-info { flex: 1; min-width: 0; }
    .cred-name { font-weight: 500; font-size: 0.925rem; }
    .cred-desc { font-size: 0.8rem; color: #6e6e73; margin-top: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .cred-keys { display: flex; gap: 0.4rem; flex-wrap: wrap; flex: 1; }
    .key-chip {
      font-family: monospace;
      font-size: 0.75rem;
      background: #f5f5f7;
      border: 1px solid #d2d2d7;
      padding: 0.15rem 0.5rem;
      border-radius: 5px;
      color: #3a3a3c;
    }

    .cred-actions { display: flex; gap: 0.5rem; }

    .empty-state {
      padding: 3rem 1.5rem;
      text-align: center;
      color: #6e6e73;
      font-size: 0.9rem;
    }

    /* Drawer overlay */
    .drawer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
    }
    .drawer-overlay.open { display: flex; align-items: flex-end; justify-content: flex-end; }

    .drawer {
      background: #fff;
      width: 480px;
      max-width: 100%;
      height: 100vh;
      overflow-y: auto;
      box-shadow: -4px 0 24px rgba(0,0,0,0.12);
      padding: 1.5rem;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .drawer-header { display: flex; align-items: center; justify-content: space-between; }
    .drawer-header h2 { font-size: 1rem; font-weight: 600; }
    .close-btn { background: none; border: none; font-size: 1.25rem; cursor: pointer; color: #6e6e73; line-height: 1; }

    /* Form */
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label { font-size: 0.82rem; font-weight: 500; color: #3a3a3c; }
    .form-group input, .form-group textarea {
      padding: 0.55rem 0.75rem;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 0.875rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: #1a56db; }
    .form-group textarea { resize: vertical; min-height: 60px; }

    .kv-rows { display: flex; flex-direction: column; gap: 0.5rem; }
    .kv-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .kv-row input { flex: 1; min-width: 80px; }
    .kv-row input[name="keys"] { font-family: monospace; font-size: 0.8rem; }
    .kv-row input[name="values"] { font-family: monospace; font-size: 0.8rem; }
    .remove-kv { background: none; border: none; cursor: pointer; color: #c0392b; font-size: 1.1rem; padding: 0 0.25rem; }

    .form-footer { display: flex; gap: 0.75rem; justify-content: flex-end; padding-top: 0.5rem; }

    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      background: #1c7c4a;
      color: #fff;
      padding: 0.65rem 1.1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 200;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <header>
    <h1>Credential Manager</h1>
    <span class="namespace-badge">{{ namespace }}</span>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <div id="toast">Saved</div>

  <!-- Drawer for create/edit -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer(event)">
    <div class="drawer" id="drawer-panel">
      <div class="drawer-header">
        <h2 id="drawer-title">New credential</h2>
        <button class="close-btn" onclick="closeDrawerForce()">×</button>
      </div>

      <form action="" method="get" id="cred-form">
        <input type="hidden" name="action" id="form-action" value="create">
        <input type="hidden" name="secret_name" id="form-name" value="">
        <input type="hidden" name="pod_ip" id="form-pod-ip" value="">
        <div style="display:flex;flex-direction:column;gap:1rem;">

          <div class="form-group">
            <label for="display_name">Name</label>
            <input id="display_name" name="display_name" type="text"
              placeholder="e.g. Stripe API Keys" required autocomplete="off" />
          </div>

          <div class="form-group">
            <label for="description">Description <span style="font-weight:400;color:#8e8e93;">(optional)</span></label>
            <input id="description" name="description" type="text"
              placeholder="What is this credential for?" autocomplete="off" />
          </div>

          <div class="form-group">
            <label>Keys &amp; values</label>
            <p id="edit-hint" style="display:none;font-size:0.78rem;color:#8e8e93;margin-bottom:0.4rem;">
              Values are write-only and cannot be retrieved. Enter new values for any keys you want to update; leave blank to remove that key.
            </p>
            <div class="kv-rows" id="kv-rows">
              <div class="kv-row">
                <input type="text" name="keys" placeholder="KEY_NAME" autocomplete="off" spellcheck="false" />
                <input type="password" name="values" placeholder="value" autocomplete="off" spellcheck="false" />
                <button type="button" class="remove-kv" onclick="this.closest('.kv-row').remove()">×</button>
              </div>
            </div>
            <button type="button" class="btn btn-secondary btn-sm"
              style="margin-top:0.5rem;align-self:flex-start;"
              onclick="addKvRow(document.getElementById('kv-rows'))">+ Add key</button>
          </div>

          <p id="secret-name-hint" style="display:none;font-size:0.78rem;color:#6e6e73;background:#f5f5f7;padding:0.6rem 0.8rem;border-radius:6px;">
            Secret name: <code id="secret-name-code" style="font-family:monospace;"></code>
          </p>

          <div class="form-footer">
            <button type="button" class="btn btn-secondary" onclick="closeDrawerForce()">Cancel</button>
            <button type="submit" class="btn btn-primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script>
    function openDrawer() {
      document.getElementById('drawer-overlay').classList.add('open');
    }
    function closeDrawer(e) {
      if (e && e.target !== document.getElementById('drawer-overlay')) return;
      document.getElementById('drawer-overlay').classList.remove('open');
    }
    function closeDrawerForce() {
      document.getElementById('drawer-overlay').classList.remove('open');
    }

    function addKvRow(container, key, value) {
      const row = document.createElement('div');
      row.className = 'kv-row';
      row.innerHTML = `
        <input type="text" name="keys" placeholder="KEY_NAME" autocomplete="off" spellcheck="false" />
        <input type="password" name="values" placeholder="value" autocomplete="off" spellcheck="false" />
        <button type="button" class="remove-kv" onclick="this.closest('.kv-row').remove()">×</button>`;
      if (key !== undefined) row.querySelector('input[name="keys"]').value = key;
      if (value !== undefined) row.querySelector('input[name="values"]').value = value;
      container.appendChild(row);
      if (key === undefined) row.querySelector('input').focus();
    }

    var _podIp = new URLSearchParams(window.location.search).get('pod_ip') || '';

    function deleteCred(name, displayName) {
      if (!confirm('Delete \u201c' + displayName + '\u201d? This cannot be undone.')) return;
      var params = new URLSearchParams({ action: 'delete', secret_name: name });
      if (_podIp) params.set('pod_ip', _podIp);
      window.location.href = '?' + params.toString();
    }

    function openNewDrawer() {
      document.getElementById('drawer-title').textContent = 'New credential';
      document.getElementById('form-action').value = 'create';
      document.getElementById('form-name').value = '';
      document.getElementById('form-pod-ip').value = _podIp;
      document.getElementById('display_name').value = '';
      document.getElementById('description').value = '';
      document.getElementById('edit-hint').style.display = 'none';
      document.getElementById('secret-name-hint').style.display = 'none';
      const kvRows = document.getElementById('kv-rows');
      kvRows.innerHTML = '';
      addKvRow(kvRows);
      openDrawer();
      document.getElementById('display_name').focus();
    }

    function openEditDrawer(name, displayName, description, keys) {
      document.getElementById('drawer-title').textContent = 'Edit credential';
      document.getElementById('form-action').value = 'update';
      document.getElementById('form-name').value = name;
      document.getElementById('form-pod-ip').value = _podIp;
      document.getElementById('display_name').value = displayName;
      document.getElementById('description').value = description || '';
      document.getElementById('edit-hint').style.display = '';
      document.getElementById('secret-name-code').textContent = name;
      document.getElementById('secret-name-hint').style.display = '';
      const kvRows = document.getElementById('kv-rows');
      kvRows.innerHTML = '';
      if (keys && keys.length > 0) {
        keys.forEach(function(k) { addKvRow(kvRows, k, ''); });
      } else {
        addKvRow(kvRows);
      }
      openDrawer();
    }
  </script>
</body>
</html>
